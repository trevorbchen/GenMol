  max_atoms: 2048
  max_edges: 16384
  max_residues: 512
  protein_edge_cutoff: 4.0
  cross_edge_cutoff: 10.0
  distance_threshold: 20.0
model:
  _target_: affinity.model.model.AffinityModel
  compile_encoder: false
  ema: true
  ema_decay: 0.999
  use_morgan: true
  use_unimol: true
  loss_args:
    alpha: 0.7
    gamma: 1.0
    delta: 0.5
    group_size: 5
  encoder_args:
    protein_repr_dim: 1536
    ligand_repr_dim: 56
    hidden_dim: 192
    output_dim: 192
    num_layers: 5
    edge_dim: 12
    m_dim: 16
    dropout: 0.1
    norm_feats: true
    norm_coors: true
    fourier_features: 8
    coor_weights_clamp_value: 2.0
    num_edge_types: 10
    attn_every: 0
    attn_heads: 6
    attn_dim_head: 64
  predictor_args:
    hidden_dim: 192
    dropout: 0.1
  training_args:
    optimizer_type: adamw
    adam_beta_1: 0.9
    adam_beta_2: 0.999
    adam_eps: 1.0e-08
    lr_scheduler: reduce_on_plateau
    reduce_lr_factor: 0.5
    reduce_lr_patience: 10
    reduce_lr_monitor: val/enzyme_all_Global_AUROC
    reduce_lr_mode: max
    base_lr: 5.0e-06
    max_lr: 0.0003
    min_lr: 6.0e-06
    warmup_epochs: 20
    weight_decay: 0
    value_loss_weight: 1
    prob_loss_weight: 1
    enzyme_loss_weight: 1
early_stopping:
  enabled: true
  monitor: val/enzyme_all_Global_AUROC
  patience: 60
  min_delta: 0.0
  mode: max
  verbose: false
