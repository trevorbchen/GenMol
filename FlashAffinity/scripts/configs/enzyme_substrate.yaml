trainer:
  accelerator: gpu
  devices: 4
  precision: 32
  gradient_clip_val: 4
  max_epochs: 1000
  accumulate_grad_batches: 3
  check_val_every_n_epoch: 1
  log_every_n_steps: 1
  enable_progress_bar: true
  enable_model_summary: true
  deterministic: true
wandb:
  name: affinity-enzyme-0
  project: affinity
  entity: clorf-sjtu
output: ../affinity_enzyme
save_top_k: 3
save_every_n_steps: 50
disable_checkpoint: false
resume: null
pretrained: null
matmul_precision: highest
find_unused_parameters: true
static_graph: false
validation_only: false
debug: false
strict_loading: true
data:
  train_sets:
    datasets:
    - type: enzyme
      structure: ./data/ESIBank/Brenda/protein_pdb.lmdb
      structure_type: pdb
      ligand: ./data/ESIBank/Brenda/ligand_sdf.lmdb
