name: v1_ddpp_4hr
output_dir: outputs/comparison

model_path: model_v2.ckpt
wall_clock_budget_sec: 14400
softmax_temp: 1.0
randomness: 0.3
min_add_len: 60

oracle: flash_affinity
oracle_higher_is_better: true
oracle_params:
  protein_pdb: FlashAffinity/data/protein_test/pdb/2VT4.pdb
  protein_repr_path: FlashAffinity/data/protein_test/repr/esm3.lmdb
  protein_id: 2VT4
  checkpoint_paths:
    - FlashAffinity/checkpoints/value_1.ckpt
  task: value

ddpp_num_gen: 1000
fa_cache_path: outputs/fa_v1_cache.jsonl
reward_shift: 3.0

ddpp_overrides:
  lr: 5.0e-5
  batch_size: 16
  lr_logz: 5.0e-4
  replay_buffer_size: 10000
  refill_interval: 25
  ema_decay: 0.9999
  num_steps: 999999

methods:
  - name: ddpp
    finetune: ddpp_direct
