name: beam_search_fa
output_dir: outputs/comparison

model_path: model_v2.ckpt
wall_clock_budget_sec: 3600

oracle: flash_affinity
oracle_higher_is_better: true
oracle_params:
  protein_pdb: FlashAffinity/data/protein_test/pdb/2VT4.pdb
  protein_repr_path: FlashAffinity/data/protein_test/repr/esm3.lmdb
  protein_id: 2VT4
  checkpoint_paths:
    - FlashAffinity/checkpoints/value_1.ckpt
    - FlashAffinity/checkpoints/value_2.ckpt
  task: value

num_samples: 100

methods:
  - name: beam_search_fa
    sampler: beam_search
    finetune: none
    guide: flash_affinity

guide_reward_params:
  protein_pdb: FlashAffinity/data/protein_test/pdb/2VT4.pdb
  protein_repr_path: FlashAffinity/data/protein_test/repr/esm3.lmdb
  protein_id: 2VT4
  checkpoint_paths:
    - FlashAffinity/checkpoints/value_1.ckpt
    - FlashAffinity/checkpoints/value_2.ckpt
  task: value

sampler_overrides:
  beam_search:
    beam_width: 100
    branching_factor: 100
    elite_buffer_size: 200
    diversity_penalty: 0.1
